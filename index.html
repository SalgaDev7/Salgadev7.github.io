<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SalgaDev7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      max-width: 500px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .bio {
      color: #94a3b8;
      margin-bottom: 25px;
      font-size: 15px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="avatar">👨‍💻</div>

    <h1>SalgaDev7</h1>

    <p class="bio">
      Mobile App Developer passionate about building clean and useful apps.
    </p>

    <a class="btn" href="#">View My App</a>

    <div class="footer">
      © 2026 SalgaDev7
    </div>

  </div>
</body>
</html>
