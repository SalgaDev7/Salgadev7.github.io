<!DOCTYPE html>
<html lang="en">
<head>

  <title>My App</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #16a34a;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

  <div class="container">
    <h1>📱 My App</h1>

    <a class="btn" href="#">Download App</a>
